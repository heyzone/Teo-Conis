name: teoheberg earn coins (WARP)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8,16 * * *"   # 每天 UTC 8:00 和 16:00

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      # =========================
      # 🟡 0️⃣ 当前仓库
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # 🟡 ⭐ 私有仓库（含脚本）
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/TeoCoins-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 🟡 1️⃣ WARP（欧洲IP规避Cloudflare封锁）
      # =========================
      - name: 创建 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      # =========================
      # 🟡 2️⃣ Python 环境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 🟡 3️⃣ 系统依赖
      #    - xvfb      : 虚拟显示（headed=True 需要）
      #    - xdotool   : uc_gui_click_captcha 鼠标点击需要
      #    - pulseaudio: 虚拟音频（Buster 音频验证需要）
      #    - p7zip-full: 解压 Buster .zip
      # =========================
      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb \
            xdotool \
            wget \
            curl \
            jq \
            p7zip-full \
            unzip \
            pulseaudio \
            alsa-utils \
            ffmpeg \
            libnss3 \
            libgbm1 \
            libasound2

      # =========================
      # 🟡 4️⃣ 安装 Google Chrome stable
      #    SeleniumBase UC mode 需要 Chrome（不是 Chromium）
      # =========================
      - name: 安装 Google Chrome
        run: |
          wget -q -O /tmp/chrome.deb \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb 2>/dev/null || \
            (sudo dpkg -i /tmp/chrome.deb; sudo apt-get install -f -y)
          google-chrome --version

      # =========================
      # 🟡 5️⃣ 启动虚拟音频设备
      #    Buster 解 reCAPTCHA 音频挑战需要麦克风权限
      # =========================
      - name: 启动虚拟音频设备
        run: |
          pulseaudio --start --exit-idle-time=-1 --daemon || true
          sleep 1
          pactl load-module module-null-sink \
            sink_name=virtual_speaker \
            sink_properties=device.description=VirtualSpeaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source \
            source_name=virtual_mic \
            master=virtual_speaker.monitor || true
          pactl set-default-source virtual_mic || true
          echo "🔊 虚拟音频已启动"
          pactl list short sinks || true

      # =========================
      # 🟡 6️⃣ 安装 Python 依赖
      #    seleniumbase 自带 UC mode（undetected-chromedriver）
      # =========================
      - name: 安装 Python 依赖
        run: |
          pip install -q seleniumbase requests
          # 预下载 chromedriver（UC mode 会自动匹配版本）
          python -c "
          import subprocess, sys
          result = subprocess.run([sys.executable, '-m', 'seleniumbase', 'install', 'chromedriver'], 
                                  capture_output=True, text=True)
          print(result.stdout)
          print(result.stderr)
          " || true

      # =========================
      # 🟡 7️⃣ 下载并解压 Buster 扩展
      #    用于自动解 reCAPTCHA 音频挑战（登录页）
      #    加载方式：--load-extension=<unpacked_dir>（通过 chromium_arg）
      #    ❌ 不用 extension_dir（UC mode 不兼容，会导致 CDP 9222 连接失败）
      # =========================
      - name: 下载 Buster 扩展
        run: |
          mkdir -p scripts/extensions/buster
          wget -q -O scripts/extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip
          echo "✅ Buster 下载完成"
          ls -lh scripts/extensions/buster/buster.zip

      - name: 解压 Buster 扩展
        run: |
          mkdir -p scripts/extensions/buster/unpacked
          7z x -y scripts/extensions/buster/buster.zip \
            -oscripts/extensions/buster/unpacked > /dev/null
          echo "📦 Buster 解压完成，验证 manifest.json:"
          ls scripts/extensions/buster/unpacked/manifest.json && \
            echo "✅ OK" || \
            (echo "⚠️ 未找到 manifest.json，目录结构：" && \
             ls -R scripts/extensions/buster/unpacked | head -30)

      # =========================
      # 🟡 8️⃣ 检查 IP（确认 WARP 生效）
      # =========================
      - name: 检查当前 IP
        run: |
          echo "🌍 当前 IP:"
          curl -s https://api.ipify.org && echo
          echo "📍 IP 信息:"
          curl -s https://ipinfo.io | jq . || curl -s https://ipinfo.io

      # =========================
      # 🟡 9️⃣ 复制脚本
      # =========================
      - name: 准备 makecoins.py
        run: |
          if [ -f scripts/makecoins.py ]; then
            cp scripts/makecoins.py ./makecoins.py
            echo "✅ 使用私有仓库中的 makecoins.py"
          else
            echo "📝 使用当前仓库的 makecoins.py"
          fi
          ls -la makecoins.py

      # =========================
      # 🟡 🔟 运行脚本
      #
      #  关键说明：
      #  - xvfb-run 启动虚拟显示，DISPLAY=:99
      #  - headed=True 使 Chrome 在虚拟显示里跑（UC mode 要求）
      #  - BUSTER_EXT_PATH 传给脚本，脚本通过 --load-extension 加载
      #  - no_sandbox=True 适配 GitHub Actions 无沙箱环境
      # =========================
      - name: 运行 makecoins.py
        env:
          TEO_EMAIL:       ${{ secrets.TEO_EMAIL }}
          TEO_PASSWORD:    ${{ secrets.TEO_PASSWORD }}
          TG_TOKEN:        ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          BUSTER_EXT_PATH: ${{ github.workspace }}/scripts/extensions/buster/unpacked
          SCREENSHOTS_DIR: ${{ github.workspace }}/screenshots
        run: |
          mkdir -p screenshots
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac" \
            python makecoins.py
        continue-on-error: true

      # =========================
      # 🟡 1️⃣1️⃣ 上传截图
      # =========================
      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: teoheberg-screenshots-${{ github.run_id }}
          path: screenshots/
          if-no-files-found: warn
          retention-days: 7
