name: teo-earn-coins

on:
  workflow_dispatch:
  schedule:
    - cron: "40 * * * *"   # 每小时 :40 运行

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      # =========================
      # 0️⃣ 当前仓库
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # ⭐ 私有仓库（含 makecoins.js）
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/TeoCoins-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 1️⃣ Node 环境
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 2️⃣ WARP（提供干净 IP，降低 reCAPTCHA 风险）
      # =========================
      - name: 创建 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      # =========================
      # 3️⃣ 系统依赖
      #    xvfb       : 虚拟显示（headless:false 必须）
      #    pulseaudio : 虚拟音频（Buster 音频解题需要）
      #    p7zip-full : 解压 Buster zip
      # =========================
      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb \
            wget \
            unzip \
            curl \
            jq \
            p7zip-full \
            pulseaudio \
            alsa-utils \
            ffmpeg

          # 启动虚拟音频（Buster 音频验证需要）
          pulseaudio --start --exit-idle-time=-1 || true
          sleep 1
          pactl load-module module-null-sink \
            sink_name=virtual_speaker \
            sink_properties=device.description=VirtualSpeaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source \
            source_name=virtual_mic \
            master=virtual_speaker.monitor || true
          pactl set-default-source virtual_mic || true
          echo "🔊 虚拟音频就绪"

      # =========================
      # 4️⃣ 安装 Node 依赖
      #
      # playwright       : 登录页 + Buster（reCAPTCHA）
      # patchright       : bypass.city Turnstile 专用
      #   - undetected Playwright，自动 patch CF 检测点
      #   - API 与 playwright 完全兼容，只换 import
      #   - 无需 API key，开源免费
      # =========================
      - name: 安装 Node 依赖
        run: |
          cd scripts
          npm init -y
          npm install playwright patchright
          # Playwright 下载 Chromium（登录 + Buster 用）
          npx playwright install chromium
          npx playwright install-deps chromium
          # patchright 下载自己的 Chrome（过 Turnstile 用）
          npx patchright install chrome
          echo "✅ playwright + patchright 安装完成"

      # =========================
      # 5️⃣ 下载并解压 Buster 扩展
      # =========================
      - name: 下载 Buster 扩展
        run: |
          mkdir -p scripts/extensions/buster
          wget -q -O scripts/extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip
          echo "✅ Buster 下载完成"

      - name: 解压 Buster 扩展
        run: |
          mkdir -p scripts/extensions/buster/unpacked
          7z x -y scripts/extensions/buster/buster.zip \
            -oscripts/extensions/buster/unpacked > /dev/null
          ls scripts/extensions/buster/unpacked/manifest.json && \
            echo "✅ Buster manifest OK" || \
            (echo "❌ manifest 缺失" && ls -R scripts/extensions/buster/unpacked | head -20)

      # =========================
      # 6️⃣ 准备 makecoins.js
      # =========================
      - name: 准备 makecoins.js
        run: |
          if [ -f scripts/makecoins.js ]; then
            echo "✅ 私有仓库 makecoins.js"
          else
            echo "⚠️ 未找到 makecoins.js，请检查私有仓库"
            ls scripts/ || true
            exit 1
          fi

      # =========================
      # 7️⃣ 检查 IP
      # =========================
      - name: 检查 IP
        run: |
          echo "🌍 IP: $(curl -s https://api.ipify.org)"
          curl -s https://ipinfo.io | jq '{ip,city,country,org}' 2>/dev/null || true

      # =========================
      # 8️⃣ 运行脚本
      #
      # 两个浏览器实例：
      #   [1] playwright + Buster → 登录 reCAPTCHA
      #   [2] patchright          → bypass.city Turnstile
      # 都需要 xvfb-run 提供虚拟显示（headless:false）
      #
      # Secrets 说明：
      #   TEO_EMAIL      TeoHeberg 登录邮箱
      #   TEO_PASSWORD   TeoHeberg 登录密码
      #   TG_TOKEN       Telegram Bot Token
      #   TG_CHAT_ID     Telegram Chat ID
      #   PRIVATE_REPO_TOKEN  私有仓库 PAT
      # =========================
      - name: 运行 makecoins.js
        env:
          TEO_EMAIL:    ${{ secrets.TEO_EMAIL }}
          TEO_PASSWORD: ${{ secrets.TEO_PASSWORD }}
          TG_TOKEN:     ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          MAX_RETRY:    "3"
        run: |
          mkdir -p scripts/screenshots
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1280x900x24 -ac" \
            node scripts/makecoins.js
        continue-on-error: true

      # =========================
      # 9️⃣ 上传截图
      # =========================
      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: teo-screenshots-${{ github.run_id }}
          path: scripts/screenshots/
          if-no-files-found: warn
          retention-days: 7
