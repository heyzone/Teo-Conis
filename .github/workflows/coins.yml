name: teoheberg earn coins

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8,16 * * *"   # UTC 8:00 / 16:00

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      # =========================
      # 0️⃣ 当前仓库
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # ⭐ 私有仓库（含 makecoins.py）
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/TeoCoins-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 1️⃣ Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 2️⃣ 系统依赖
      #    xvfb    : 虚拟显示（headed=True + uc_gui_click_captcha 必须）
      #    xdotool : uc_gui_click_captcha 底层鼠标控制
      # =========================
      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb \
            xdotool \
            wget \
            curl \
            jq \
            libnss3 \
            libgbm1 \
            libasound2

      # =========================
      # 3️⃣ Google Chrome stable
      # =========================
      - name: 安装 Google Chrome
        run: |
          wget -q -O /tmp/chrome.deb \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb 2>/dev/null || \
            (sudo dpkg -i /tmp/chrome.deb; sudo apt-get install -f -y)
          google-chrome --version

      # =========================
      # 4️⃣ gost（SOCKS5 → HTTP 代理）
      #    Chrome 原生不支持带认证的 SOCKS5，gost 做转换
      # =========================
      - name: 安装 gost
        run: |
          GOST_VER="2.11.5"
          wget -q -O /tmp/gost.gz \
            "https://github.com/ginuerzh/gost/releases/download/v${GOST_VER}/gost-linux-amd64-${GOST_VER}.gz"
          gunzip -f /tmp/gost.gz
          # 文件名可能带版本号
          GOST_FILE=$(ls /tmp/gost* 2>/dev/null | grep -v gz | head -1)
          sudo mv "$GOST_FILE" /usr/local/bin/gost
          sudo chmod +x /usr/local/bin/gost
          gost -V 2>&1 || true
          echo "✅ gost 安装完成"

      # =========================
      # 5️⃣ Python 依赖
      # =========================
      - name: 安装 Python 依赖
        run: |
          pip install -q seleniumbase requests
          # 预下载匹配版本的 chromedriver
          python -c "
          import subprocess, sys
          r = subprocess.run(
              [sys.executable, '-m', 'seleniumbase', 'install', 'chromedriver'],
              capture_output=True, text=True, timeout=120
          )
          print(r.stdout[-300:] if r.stdout else 'no output')
          if r.returncode != 0:
              print(r.stderr[-200:])
          " || true

      # =========================
      # 6️⃣ 检查直连 IP
      # =========================
      - name: 检查直连 IP
        run: |
          echo "🌍 Runner IP: $(curl -s --max-time 5 https://api.ipify.org)"

      # =========================
      # 7️⃣ 准备脚本
      # =========================
      - name: 准备 makecoins.py
        run: |
          if [ -f scripts/makecoins.py ]; then
            cp scripts/makecoins.py ./makecoins.py
            echo "✅ 私有仓库 makecoins.py"
          else
            echo "📝 当前仓库 makecoins.py"
          fi
          ls -la makecoins.py

      # =========================
      # 8️⃣ 运行
      #
      # PROXY_LIST Secret 格式（每行一个节点）：
      #   socks5://user:pass@1.2.3.4:1080
      #   socks5://user:pass@5.6.7.8:1080
      #
      # 流程：
      #   验证代理连通 → 启动全新 Chrome → uc_gui_click_captcha 过验证
      #   出现图片挑战 → 换节点（IP 质量不足）
      #   每节点 3 次，全部失败才切换下一节点
      # =========================
      - name: 运行 makecoins.py
        env:
          TEO_EMAIL:       ${{ secrets.TEO_EMAIL }}
          TEO_PASSWORD:    ${{ secrets.TEO_PASSWORD }}
          TG_TOKEN:        ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          PROXY_LIST:      ${{ secrets.TEO_PROXY_LIST }}
          GOST_BIN:        /usr/local/bin/gost
          SCREENSHOTS_DIR: ${{ github.workspace }}/screenshots
        run: |
          mkdir -p screenshots
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1280x900x24 -ac" \
            python makecoins.py
        continue-on-error: true

      # =========================
      # 9️⃣ 上传截图
      # =========================
      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: teoheberg-screenshots-${{ github.run_id }}
          path: screenshots/
          if-no-files-found: warn
          retention-days: 7
