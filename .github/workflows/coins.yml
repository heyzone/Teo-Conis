name: teoheberg earn coins (WARP)
on:
  workflow_dispatch:
  schedule:
    - cron: "0 8,16 * * *" # 每天 UTC 8:00 和 16:00

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/TeoCoins-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: 创建 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb xdotool wget curl jq p7zip-full unzip \
            pulseaudio alsa-utils ffmpeg \
            libnss3 libgbm1 libasound2

      - name: 安装 Google Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || (sudo dpkg -i /tmp/chrome.deb && sudo apt-get install -f -y)
          google-chrome --version

      - name: 启动虚拟音频设备（Buster 音频识别关键）
        run: |
          pulseaudio --start --exit-idle-time=-1 --daemon || true
          sleep 2
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source source_name=virtual_mic master=virtual_speaker.monitor || true
          pactl set-default-source virtual_mic || true
          echo "🔊 虚拟音频设备状态："
          pactl list short sinks
          pactl list short sources

      - name: 安装 Python 依赖
        run: |
          pip install -q seleniumbase requests
          python -m seleniumbase install chromedriver --force || true

      - name: 下载并解压 Buster 扩展
        run: |
          mkdir -p scripts/extensions/buster/unpacked
          wget -q -O scripts/extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip
          7z x -y scripts/extensions/buster/buster.zip -oscripts/extensions/buster/unpacked > /dev/null
          ls scripts/extensions/buster/unpacked/manifest.json && echo "✅ Buster 解压成功" || echo "⚠️ Buster manifest 未找到"

      - name: 检查当前 IP
        run: |
          echo "🌍 当前 IP: $(curl -s https://api.ipify.org)"
          curl -s https://ipinfo.io | jq . || true

      - name: 准备 makecoins.py
        run: |
          if [ -f scripts/makecoins.py ]; then
            cp scripts/makecoins.py ./makecoins.py
            echo "✅ 使用私有仓库 makecoins.py"
          else
            echo "📝 使用当前仓库 makecoins.py"
          fi
          ls -la makecoins.py

      - name: 运行 makecoins.py
        env:
          TEO_EMAIL: ${{ secrets.TEO_EMAIL }}
          TEO_PASSWORD: ${{ secrets.TEO_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          BUSTER_EXT_PATH: ${{ github.workspace }}/scripts/extensions/buster/unpacked
          SCREENSHOTS_DIR: ${{ github.workspace }}/screenshots
        run: |
          mkdir -p screenshots
          xvfb-run -a --server-args="-screen 0 1920x1080x24 -ac" \
            python makecoins.py
        continue-on-error: true

      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: teoheberg-screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 7
