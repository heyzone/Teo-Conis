name: teoheberg earn coins

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8,16 * * *"

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      # =========================
      # 0️⃣ 当前仓库
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # ⭐ 私有仓库
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gaming4free-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 1️⃣ Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 2️⃣ 系统依赖
      #
      # ❌ 不安装 google-chrome-stable
      #    SeleniumBase UC mode 自己管理 Chrome，
      #    手动安装 Chrome 反而可能版本冲突
      #
      # ✅ xvfb   : 虚拟显示（Linux headed=False，xvfb-run 管理）
      # ✅ xdotool: uc_gui_click_captcha 底层鼠标依赖
      # =========================
      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb \
            xdotool \
            wget \
            curl \
            jq \
            libnss3 \
            libgbm1 \
            libasound2 \
            libxss1 \
            libxtst6

      # =========================
      # 3️⃣ gost（SOCKS5 → HTTP 代理转换）
      # =========================
      - name: 安装 gost
        run: |
          GOST_VER="2.11.5"
          wget -q -O /tmp/gost.gz \
            "https://github.com/ginuerzh/gost/releases/download/v${GOST_VER}/gost-linux-amd64-${GOST_VER}.gz"
          gunzip -f /tmp/gost.gz
          GOST_FILE=$(ls /tmp/gost-linux-amd64-* 2>/dev/null | grep -v gz | head -1 || echo /tmp/gost)
          sudo mv "$GOST_FILE" /usr/local/bin/gost
          sudo chmod +x /usr/local/bin/gost
          gost -V 2>&1 || true
          echo "✅ gost 完成"

      # =========================
      # 4️⃣ Python 依赖
      #    seleniumbase 会自动下载并管理 Chrome + chromedriver
      # =========================
      - name: 安装 Python 依赖
        run: |
          pip install -q seleniumbase requests
          # 让 seleniumbase 提前下载 chrome + chromedriver
          # UC mode 使用 undetected-chromedriver 自带的 chrome
          python -c "
          import subprocess, sys
          r = subprocess.run(
              [sys.executable, '-m', 'seleniumbase', 'install', 'chromedriver'],
              capture_output=True, text=True, timeout=120
          )
          print(r.stdout[-300:] if r.stdout else '')
          if r.returncode != 0:
              print('stderr:', r.stderr[-200:])
          " || true

      # =========================
      # 5️⃣ 检查 Runner IP
      # =========================
      - name: 检查 Runner IP
        run: |
          echo "🌍 Runner IP: $(curl -s --max-time 5 https://api.ipify.org || echo unknown)"

      # =========================
      # 6️⃣ 准备脚本
      # =========================
      - name: 准备 makecoins.py
        run: |
          if [ -f scripts/makecoins.py ]; then
            cp scripts/makecoins.py ./makecoins.py
            echo "✅ 私有仓库版本"
          else
            echo "📝 当前仓库版本"
          fi
          ls -la makecoins.py

      # =========================
      # 7️⃣ 运行
      #
      # Linux 下脚本内 headed=False，Chrome 跑在 xvfb-run 的虚拟显示里
      # uc_gui_click_captcha 通过 xdotool 控制鼠标，需要 DISPLAY 环境变量
      #
      # PROXY_LIST Secret 格式（每行一个）：
      #   socks5://user:pass@1.2.3.4:1080
      #   socks5://user:pass@5.6.7.8:1080
      #
      # 节点策略：
      #   验证连通 → 启全新 Chrome → uc_gui_click_captcha
      #   → 出现图片挑战(bframe) = IP差 → blocked → 换节点
      #   → 每节点最多3次，blocked 立即换
      # =========================
      - name: 运行 makecoins.py
        env:
          TEO_EMAIL:       ${{ secrets.TEO_EMAIL }}
          TEO_PASSWORD:    ${{ secrets.TEO_PASSWORD }}
          TG_TOKEN:        ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          PROXY_LIST:      ${{ secrets.TEO_PROXY_LIST }}
          GOST_BIN:        /usr/local/bin/gost
          SCREENSHOTS_DIR: ${{ github.workspace }}/screenshots
        run: |
          mkdir -p screenshots
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1280x900x24 -ac" \
            python makecoins.py
        continue-on-error: true

      # =========================
      # 8️⃣ 上传截图
      # =========================
      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: teoheberg-screenshots-${{ github.run_id }}
          path: screenshots/
          if-no-files-found: warn
          retention-days: 7
